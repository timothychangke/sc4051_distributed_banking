name: Go Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        # Match the lowercase name found on GitHub
        working-directory: ./server 
        run: go mod download

      - name: Run Tests 
        working-directory: ./server
        run: go test -v -race ./...

  # ── Integration tests (informational, never blocks merge) ───────
  integration-test:
    runs-on: windows-latest
    if: always()
    needs: [ test ]
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install C++ build tools
        run: choco install mingw --no-progress -y

      - name: Build Go server
        working-directory: ./server
        shell: bash
        run: |
          mkdir -p bin
          go build -o ./bin/server.exe ./cmd/main.go

      - name: Build C++ client
        working-directory: ./client
        shell: bash
        run: |
          mkdir -p build
          cd build
          cmake -G "MinGW Makefiles" ..
          mingw32-make -j$(nproc)

      - name: Run integration tests
        working-directory: ./integration_test
        shell: bash
        env:
          SERVER_BIN: ../server/bin/server.exe
          CLIENT_BIN: ../client/build/client.exe
        run: go test -v -timeout 600s -count=1 . 2>&1 | tee integration-results.txt
 
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: ./integration_test/integration-results.txt
 